<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POC IndexedDB — App de Notas</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>POC IndexedDB</h1>
    <p class="subtitle">App de notas demonstrando os fundamentos da API</p>
  </header>

  <main>
    <section class="panel">
      <h2>Nova nota</h2>
      <form id="note-form">
        <input type="hidden" id="note-id" />
        <label>
          Título
          <input type="text" id="note-title" required maxlength="100" />
        </label>
        <label>
          Conteúdo
          <textarea id="note-content" rows="4" required></textarea>
        </label>
        <label>
          Tag
          <input type="text" id="note-tag" placeholder="ex: trabalho, pessoal" />
        </label>
        <div class="actions">
          <button type="submit" id="save-btn">Salvar</button>
          <button type="button" id="cancel-btn" hidden>Cancelar edição</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <h2>Notas salvas</h2>
      <div class="filter">
        <label>
          Filtrar por tag
          <input type="text" id="filter-tag" placeholder="deixe vazio para listar todas" />
        </label>
        <button type="button" id="clear-all-btn" class="danger">Apagar tudo</button>
      </div>
      <ul id="note-list" class="note-list"></ul>
      <p id="empty-state" class="empty">Nenhuma nota cadastrada.</p>
    </section>

    <section class="panel log-panel">
      <h2>Log de operações</h2>
      <p class="hint">Acompanhe transações, requests e eventos do IndexedDB em tempo real.</p>
      <pre id="log"></pre>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
