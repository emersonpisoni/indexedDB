<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IndexedDB POC — Notes App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>IndexedDB POC</h1>
    <p class="subtitle">Notes app demonstrating the fundamentals of the API</p>
  </header>

  <main>
    <section class="panel">
      <h2>New note</h2>
      <form id="note-form">
        <input type="hidden" id="note-id" />
        <label>
          Title
          <input type="text" id="note-title" required maxlength="100" />
        </label>
        <label>
          Content
          <textarea id="note-content" rows="4" required></textarea>
        </label>
        <label>
          Tag
          <input type="text" id="note-tag" placeholder="e.g. work, personal" />
        </label>
        <div class="actions">
          <button type="submit" id="save-btn">Save</button>
          <button type="button" id="cancel-btn" hidden>Cancel edit</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <h2>Saved notes</h2>
      <div class="filter">
        <label>
          Filter by tag
          <input type="text" id="filter-tag" placeholder="leave empty to list all" />
        </label>
        <button type="button" id="clear-all-btn" class="danger">Delete all</button>
      </div>
      <ul id="note-list" class="note-list"></ul>
      <p id="empty-state" class="empty">No notes saved.</p>
    </section>

    <section class="panel log-panel">
      <h2>Operations log</h2>
      <p class="hint">Watch IndexedDB transactions, requests, and events in real time.</p>
      <pre id="log"></pre>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
